<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel de Agendamentos</title>

<link rel="stylesheet" href="style.css">

<style>

.card-agenda{

background:rgba(255,255,255,0.25);
backdrop-filter:blur(10px);

padding:15px;
border-radius:15px;

margin-bottom:15px;

display:flex;
flex-direction:column;
gap:8px;

}

.cancelar{

background:#ff7b7b;
color:white;

border:none;
padding:8px;

border-radius:20px;

cursor:pointer;

}

</style>

</head>

<body>

<div class="container">

<div class="logo-area">

<div class="monograma">PL</div>

<h1>Patricia Lima</h1>

<p class="frase">Realçando sua beleza natural</p>

</div>

<section class="agenda">

<h2>Painel de Agendamentos</h2>

<div id="lista"></div>

</section>

<a href="index.html" class="botao">
🏠 Voltar para início
</a>

</div>

<script>

let lista = document.getElementById("lista")

let agendamentos = JSON.parse(localStorage.getItem("agendamentos")) || []

function carregar(){

lista.innerHTML=""

if(agendamentos.length === 0){

lista.innerHTML="Nenhum agendamento."

return

}

agendamentos.forEach((a,index)=>{

let card = document.createElement("div")

card.className="card-agenda"

card.innerHTML = `
<strong>${a.nome}</strong>
Serviço: ${a.servico}
Data: ${a.data}
Hora: ${a.hora}

<button class="cancelar" onclick="cancelar(${index})">
Cancelar
</button>
`

lista.appendChild(card)

})

}

function cancelar(index){

agendamentos.splice(index,1)

localStorage.setItem("agendamentos",JSON.stringify(agendamentos))

carregar()

}

carregar()

</script>

</body>
</html>
