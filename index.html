<div id="banner-instalar">
  <div class="banner-icone">📲</div>
  <div class="banner-texto">
    <div class="banner-titulo">Instalar como App</div>
    <div class="banner-desc">Acesse rapidinho no seu celular!</div>
  </div>
  <button class="banner-btn" onclick="instalarApp()">Instalar</button>
  <button class="banner-fechar" onclick="document.getElementById('banner-instalar').style.display='none'">✕</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="script.js"></script>
<script>
// Registra o Service Worker (PWA)
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/sw.js")
      .then(() => console.log("✅ Service Worker registrado"))
      .catch(e => console.warn("SW não registrado:", e));
  });
}

// Captura o evento de instalação para mostrar botão personalizado
let deferredPrompt = null;
const bannerInstall = document.getElementById("banner-instalar");

window.addEventListener("beforeinstallprompt", e => {
  e.preventDefault();
  deferredPrompt = e;
  if (bannerInstall) bannerInstall.style.display = "flex";
});

function instalarApp() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(result => {
    deferredPrompt = null;
    if (bannerInstall) bannerInstall.style.display = "none";
  });
}

window.addEventListener("appinstalled", () => {
  if (bannerInstall) bannerInstall.style.display = "none";
  deferredPrompt = null;
});

// Carrega frase e instagram do Supabase
(async function() {
  try {
    const frase = await dbGetConfig("frase", null);
    if (frase) {
      const el = document.querySelector(".frase");
      if (el) el.textContent = frase;
    }
    const insta = await dbGetConfig("instagram", null);
    if (insta) {
      const link = document.querySelector('a[href*="instagram.com"]');
      if (link) link.href = `https://instagram.com/${insta}`;
      const rodape = document.querySelector('.rodape-box p');
      if (rodape && rodape.textContent.includes('@')) rodape.textContent = `@${insta}`;
    }
  } catch(e) { console.warn("Config load:", e); }
})();
</script>
