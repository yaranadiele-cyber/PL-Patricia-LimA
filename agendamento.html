<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Agendamento</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<div class="logo-area">

<div class="monograma">PL</div>

<h1>Patricia Lima</h1>

<p class="frase">Realçando sua beleza natural</p>

</div>


<section class="agenda">

<h2>Agendar Horário</h2>

<input type="text" id="nome" placeholder="Seu nome">

<select id="servico">

<option>Design de sobrancelha</option>
<option>Design de sobrancelha com Henna</option>
<option>Design de unhas</option>
<option>Penteados</option>
<option>Maquiagem</option>

</select>

<input type="date" id="data">

<select id="hora">

<option>09:00</option>
<option>10:00</option>
<option>11:00</option>
<option>13:00</option>
<option>14:00</option>
<option>15:00</option>

</select>

<button onclick="enviarWhatsapp()" class="botao">
Agendar pelo WhatsApp
</button>

</section>

<a href="index.html" class="botao">
🏠 Voltar para início
</a>

</div>

<script src="agendamento.js"></script>

</body>
</html>
