<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Patricia Lima</title>

<link rel="stylesheet" href="style.css">

<style>

.card{
background:rgba(255,255,255,0.25);
backdrop-filter:blur(10px);
padding:15px;
border-radius:15px;
margin-bottom:15px;
display:flex;
flex-direction:column;
gap:6px;
}

.cancelar{
background:#ff7b7b;
color:white;
border:none;
padding:8px;
border-radius:20px;
cursor:pointer;
}

</style>

</head>

<body>

<h2>Painel de Agendamentos</h2>

<div id="lista"></div>

<script>

let lista=document.getElementById("lista")

let agendamentos=JSON.parse(localStorage.getItem("agendamentos"))||[]

function carregar(){

lista.innerHTML=""

if(agendamentos.length==0){

lista.innerHTML="Nenhum agendamento"

return

}

agendamentos.forEach((a,index)=>{

let card=document.createElement("div")

card.className="card"

card.innerHTML=`

<strong>${a.nome}</strong>

Serviço: ${a.servico}

Data: ${a.data}

Hora: ${a.hora}

<button class="cancelar" onclick="cancelar(${index})">
Cancelar
</button>

`

lista.appendChild(card)

})

}

function cancelar(i){

agendamentos.splice(i,1)

localStorage.setItem("agendamentos",JSON.stringify(agendamentos))

carregar()

}

carregar()

</script>

</body>
</html>
